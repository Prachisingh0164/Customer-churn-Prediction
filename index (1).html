<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Churn Prediction</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h1>Churn Predictor</h1>
            <form action="/predict" method="post">

                <label for="CreditScore">Credit Score:</label>
                <input type="text" name="CreditScore" id="CreditScore" required>

                <label for="Geography">Geography:</label>
                <select name="Geography" id="Geography" required>
                    <option value="France">France</option>
                    <option value="Germany">Germany</option>
                    <option value="Spain">Spain</option>
                </select>

                <label for="Gender">Gender:</label>
                <select name="Gender" id="Gender" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>

                <label for="Age">Age:</label>
                <input type="text" name="Age" id="Age" required>

                <label for="Tenure">Tenure (years):</label>
                <input type="text" name="Tenure" id="Tenure" required>

                <label for="Balance">Balance:</label>
                <input type="text" name="Balance" id="Balance" required>

                <label for="NumOfProducts">Number of Products:</label>
                <input type="text" name="NumOfProducts" id="NumOfProducts" required>

                <label for="HasCrCard">Has Credit Card (1 = Yes, 0 = No):</label>
                <input type="text" name="HasCrCard" id="HasCrCard" required>

                <label for="IsActiveMember">Is Active Member (1 = Yes, 0 = No):</label>
                <input type="text" name="IsActiveMember" id="IsActiveMember" required>

                <label for="EstimatedSalary">Estimated Salary:</label>
                <input type="text" name="EstimatedSalary" id="EstimatedSalary" required>

                <button type="submit">Predict</button>
            </form>
        </div>

        <div class="result-container">
            <h2>Result</h2>
            <p>{{ prediction_text }}</p>
        </div>
    </div>
</body>
</html>
